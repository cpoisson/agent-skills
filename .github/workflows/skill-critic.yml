name: Skill Critic

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skill-critic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run skill critic
        run: ./scripts/skill_critic.py --thresholds-file evals/skill_critic_thresholds.json --markdown-out skill-evaluations.md
      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: skill-evaluations
          path: skill-evaluations.md

  semantic-judge:
    runs-on: ubuntu-latest
    needs: skill-critic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Start Ollama
        run: docker run -d --rm -p 11434:11434 --name ollama ollama/ollama:latest
      - name: Wait for Ollama API
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Ollama did not become ready in time" >&2
          exit 1
      - name: Pull semantic judge model
        run: |
          curl -fsS http://127.0.0.1:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d '{"model":"qwen2.5:1.5b","stream":false}'
      - name: Run semantic judge
        run: ./scripts/semantic_skill_judge.py --provider ollama --model qwen2.5:1.5b --thresholds-file evals/semantic_judge_thresholds.json --markdown-out semantic-judge.md
      - name: Upload semantic judge report
        uses: actions/upload-artifact@v4
        with:
          name: semantic-judge-evaluations
          path: semantic-judge.md
